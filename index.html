<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Red Reflex Game</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div id="menu">

<h1>Red Reflex Game</h1>

<p class="game-text">
Play this reflex game and train your aim and reaction speed
by clicking the red circles as fast as possible.
</p>

<input id="username" placeholder="Enter your username">

<div class="buttons">

<button id="playBtn">Play</button>
<button id="leaderboardBtn">Leaderboard</button>

</div>

</div>


<div id="gameArea" class="hidden">

<div id="timer">0.00</div>

<div id="result" class="hidden"></div>

<div id="shareScore" class="hidden">

<p id="shareText"></p>

<button id="copyLinkBtn">Copy Link</button>

</div>

<button id="replayBtn">Replay</button>

<button id="homeBtn">Home</button>

</div>


<div id="leaderboardPage" class="hidden">

<h2>Top 300 Players</h2>

<ul id="leaderboardList"></ul>

<button onclick="goHome()">Back</button>

</div>


<footer>

<a href="privacy.html">Privacy Policy</a>
<a href="legal.html">Legal Notice</a>
<a href="contact.html">Contact</a>

</footer>

<script src="script.js"></script>

</body>
</html>
